<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllStar Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #06091a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      padding: 48px 20px;
      overflow-x: hidden;
      font-family: 'Open Sans', sans-serif;
    }

    /* ── Background ── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
    }

    .bg-blob-1 {
      width: 560px;
      height: 560px;
      background: #00e3fd;
      top: -160px;
      left: -160px;
      opacity: 0.12;
      animation: drift1 13s ease-in-out infinite alternate;
    }

    .bg-blob-2 {
      width: 480px;
      height: 480px;
      background: #ffd16c;
      bottom: -140px;
      right: -140px;
      opacity: 0.1;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    .bg-blob-3 {
      width: 300px;
      height: 300px;
      background: #a259ff;
      bottom: 20%;
      left: 5%;
      opacity: 0.07;
      animation: drift1 18s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift1 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(50px, 35px) scale(1.05);
      }
    }

    @keyframes drift2 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(-45px, -35px) scale(1.08);
      }
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      width: 260px;
      height: 260px;
    }

    .logo-content {
      position: relative;
      z-index: 2;
      animation: float 4s ease-in-out infinite;
      transition: transform 0.5s;
      cursor: pointer;
    }

    .logo-content:hover {
      transform: scale(1.05);
    }

    .logo-wrap img {
      width: 260px;
      height: 260px;
      object-fit: contain;
      filter: drop-shadow(0 0 50px rgba(255, 209, 108, 0.55));
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .orbital-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .ring-1 {
      inset: -20px;
      border: 1px solid rgba(255, 209, 108, 0.15);
      animation: spin 12s linear infinite;
    }

    .ring-2 {
      inset: -42px;
      border: 1px solid rgba(0, 227, 253, 0.1);
      animation: spin 20s linear infinite reverse;
    }

    .orbital-dot {
      position: absolute;
      border-radius: 50%;
      left: 50%;
      transform: translateX(-50%);
    }

    .dot-1 {
      top: -6px;
      width: 12px;
      height: 12px;
      background: rgba(255, 209, 108, 0.6);
      box-shadow: 0 0 8px #ffd16c;
    }

    .dot-2 {
      top: -4px;
      width: 8px;
      height: 8px;
      background: rgba(0, 227, 253, 0.5);
      box-shadow: 0 0 6px #00e3fd;
    }

    .logo-glow-bg {
      position: absolute;
      inset: 0;
      background: rgba(255, 209, 108, 0.15);
      border-radius: 50%;
      filter: blur(80px);
      z-index: -10;
      pointer-events: none;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        filter: drop-shadow(0 0 24px rgba(255, 209, 108, 0.5));
      }

      50% {
        filter: drop-shadow(0 0 60px rgba(255, 209, 108, 0.9));
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-11px);
      }
    }

    /* ── Cards container ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 2;
    }

    /* ── Card ── */
    .card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 24px;
      border-radius: 20px;
      text-decoration: none;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid transparent;
    }

    /* Shimmer border via pseudo */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1px;
      background: var(--border-grad);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      transition: opacity 0.25s;
    }

    .card:hover::before {
      opacity: 1;
    }

    /* Background fill */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: var(--card-bg);
      z-index: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--card-shadow);
    }

    /* Card 1 – PRM / cyan */
    .card-prm {
      --border-grad: linear-gradient(135deg, rgba(0, 227, 253, 0.6), rgba(0, 227, 253, 0.1) 60%, transparent);
      --card-bg: linear-gradient(135deg, rgba(0, 227, 253, 0.07) 0%, rgba(0, 0, 0, 0) 70%);
      --card-shadow: 0 12px 40px rgba(0, 227, 253, 0.18);
      --accent: #00e3fd;
      --tag-bg: rgba(0, 227, 253, 0.12);
      --tag-color: #ffffff;
    }

    /* Card 2 – SIH / gold */
    .card-sih {
      --border-grad: linear-gradient(135deg, rgba(255, 209, 108, 0.6), rgba(255, 209, 108, 0.1) 60%, transparent);
      --card-bg: linear-gradient(135deg, rgba(255, 209, 108, 0.07) 0%, rgba(0, 0, 0, 0) 70%);
      --card-shadow: 0 12px 40px rgba(255, 209, 108, 0.15);
      --accent: #ffd16c;
      --tag-bg: rgba(255, 209, 108, 0.12);
      --tag-color: #ffd16c;
    }

    /* Card icon */
    .card-icon {
      position: relative;
      z-index: 1;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--tag-bg);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
      font-size: 22px;
      transition: transform 0.25s;
    }

    .card:hover .card-icon {
      transform: scale(1.1);
    }

    /* Card text */
    .card-text {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
    }

    .card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--tag-color);
      background: var(--tag-bg);
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    .card-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 3px;
      font-weight: 500;
    }

    /* Arrow */
    .card-arrow {
      position: relative;
      z-index: 1;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--tag-bg);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
      transition: background 0.25s, transform 0.25s;
      font-size: 17px;
    }

    .card:hover .card-arrow {
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      transform: translateX(3px);
    }

    /* Sparkle dots */
    .card-dots {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      border-radius: 20px;
      pointer-events: none;
    }

    .card-dots span {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.12;
    }



    /* ── Light mode ── */
    body.light {
      background: #eef2f7;
    }

    body.light #theme-toggle {
      border-color: rgba(0, 0, 0, 0.12);
      background: rgba(0, 0, 0, 0.05);
      color: rgba(0, 0, 0, 0.6);
    }

    body.light #theme-toggle:hover {
      background: rgba(0, 0, 0, 0.1);
      color: #000;
    }

    body.light .card-title {
      color: #0f172a;
    }

    body.light .card-sub {
      color: rgba(0, 0, 0, 0.45);
    }

    body.light .card-prm {
      --card-bg: linear-gradient(135deg, rgba(0, 227, 253, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
      --card-shadow: 0 12px 40px rgba(0, 227, 253, 0.22);
    }

    body.light .card-sih {
      --card-bg: linear-gradient(135deg, rgba(255, 209, 108, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
      --card-shadow: 0 12px 40px rgba(255, 209, 108, 0.2);
    }

    body.light .bg-blob-1 {
      opacity: 0.07;
    }

    body.light .bg-blob-2 {
      opacity: 0.07;
    }

    body.light .bg-blob-3 {
      opacity: 0.04;
    }
  </style>
</head>

<body>



  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="logo-wrap">
    <div class="logo-content">
      <img src="https://i.ibb.co/xqn9Yncx/logo.png" alt="AllStar Club">
    </div>

    <!-- Orbital ring 1 -->
    <div class="orbital-ring ring-1">
      <div class="orbital-dot dot-1"></div>
    </div>

    <!-- Orbital ring 2 -->
    <div class="orbital-ring ring-2">
      <div class="orbital-dot dot-2"></div>
    </div>

    <!-- Glow behind logo -->
    <div class="logo-glow-bg"></div>
  </div>

  <div class="cards">

    <a href="/prm/index.html" class="card card-prm">
      <div class="card-dots">
        <span style="width:80px;height:80px;top:-20px;right:60px;filter:blur(20px)"></span>
        <span style="width:40px;height:40px;bottom:10px;right:20px;filter:blur(12px)"></span>
      </div>
      <div class="card-icon">
        <span class="material-symbols-outlined">trophy</span>
      </div>
      <div class="card-text">
        <span class="card-tag">AllStar Club</span>
        <p class="card-title">PRM Techcombank</p>
        <p class="card-sub">Chương trình Loyalty · Lực lượng tư vấn</p>
      </div>
      <div class="card-arrow">
        <span class="material-symbols-outlined">arrow_forward</span>
      </div>
    </a>

    <a href="/sih/index.html" class="card card-sih">
      <div class="card-dots">
        <span style="width:80px;height:80px;top:-20px;right:60px;filter:blur(20px)"></span>
        <span style="width:40px;height:40px;bottom:10px;right:20px;filter:blur(12px)"></span>
      </div>
      <div class="card-icon">
        <span class="material-symbols-outlined">trophy</span>
      </div>
      <div class="card-text">
        <span class="card-tag">AllStar Club</span>
        <p class="card-title">LLB OneHousing</p>
        <p class="card-sub">Chương trình Loyalty · Sale In-House</p>
      </div>
      <div class="card-arrow">
        <span class="material-symbols-outlined">arrow_forward</span>
      </div>
    </a>

  </div>



</body>

</html>
